services:
  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:8-alpine

    ports:
      - "6379:6379"

    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api

    env_file:
      - ../.env.docker

    ports:
      - "6969:6969"

    depends_on:
      - postgres
      - redis
      - qdrant

    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: agent

    env_file:
      - ../.env.docker

    ports:
      - "6767:6767"

    depends_on:
      - postgres
      - redis
      - qdrant

    restart: unless-stopped

  erp-adapter:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: erp

    env_file:
      - ../.env.docker

    ports:
      - "6868:6868"

    depends_on:
      - postgres

    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker

    env_file:
      - ../.env.docker

    depends_on:
      - redis

    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend

    ports:
      - "5173:80"

    depends_on:
      - api

    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data: